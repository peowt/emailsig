
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PEO West Toronto Email Signature Generator</title>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f7fa;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.container{
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
max-width:720px;
width:100%;
}

h1{
color:#005c99;
margin:0;
font-size:22px;
}

.subtitle{
margin-top:6px;
margin-bottom:25px;
color:#444;
}

label{
font-weight:600;
font-size:14px;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
font-size:14px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#005c99;
color:white;
border:none;
padding:10px 16px;
margin-right:10px;
font-size:14px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004a7a;
}

.preview{
border-top:1px solid #ddd;
padding-top:25px;
margin-top:25px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/peowt/emailsig/main/peo_west_toronto_logo.png"
width="180"
style="width:180px;height:auto;display:block;border:0;max-width:180px;">

<h1>PEO West Toronto Chapter</h1>
<div class="subtitle">Official Email Signature Generator</div>

<label>Name</label>
<input id="name" placeholder="Ray Seker">

<label>Primary Role</label>
<select id="role">
<option>Chair</option>
<option selected>Vice Chair</option>
<option>Treasurer</option>
<option>Secretary</option>
<option>Past Chair</option>
<option>Executive</option>
</select>

<label>Additional Responsibility (optional)</label>
<input id="extraRole" placeholder="Co-Chair Licensing Ceremony">

<button onclick="generate()">Generate Signature</button>
<button id="copyBtn" onclick="copySignature()">Copy Signature</button>

<div class="preview">

<div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#666;">
Preview Your Email Signature
</div>

<div style="border:1px solid #dcdcdc;background:#ffffff;padding:20px;border-radius:6px;font-family:Calibri, Arial;">
<div id="signature"></div>
</div>

</div>

</div>

<script>

const LOGO_URL = "https://raw.githubusercontent.com/peowt/emailsig/main/peo_west_toronto_logo.png";
const BADGE_URL = "https://raw.githubusercontent.com/peowt/emailsig/main/west_toronto_badge.png";
const WEBSITE_URL = "https://www.peo.on.ca/chapters/westtoronto";

function normalizePEng(name){
name = name.trim();
name = name.replace(/\s*,?\s*P\.?\s*Eng\.?$/i, "");
return name.trim() + ", P.Eng.";
}

function generate(){

let rawName=document.getElementById("name").value.trim();

if(rawName === ""){
alert("Please enter your name before generating the signature.");
return;
}

let name = normalizePEng(rawName);

let role=document.getElementById("role").value;
let extra=document.getElementById("extraRole").value;

let roleLine = role;

if(extra.trim() !== ""){
roleLine = role + " | " + extra;
}

document.getElementById("signature").innerHTML = `

<div style="font-size:1px;line-height:1px;color:#ffffff;">&nbsp;</div>

<table cellpadding="0" cellspacing="0" border="0" style="max-width:600px;">

<tr>

<td width="170" style="width:170px;vertical-align:middle;padding:0;border-right:1px solid #e6e6e6;">
<img src="${LOGO_URL}"
width="170"
style="width:170px;height:auto;max-width:170px;display:block;border:0;">
</td>

<td style="padding-left:10px;vertical-align:middle;">

<table cellpadding="0" cellspacing="0" border="0">

<tr>
<td style="font-family:Garamond, Georgia, 'Times New Roman', serif;font-size:12pt;color:#005c99;line-height:18px;">
<strong>${name}</strong>
</td>
</tr>

<tr>
<td style="font-family:Garamond, Georgia, 'Times New Roman', serif;font-size:11pt;color:#005c99;line-height:16px;">
${roleLine}
</td>
</tr>

<tr>
<td style="padding-top:3px;">
<a href="${WEBSITE_URL}" title="Visit the PEO West Toronto Chapter website">
<img src="${BADGE_URL}"
height="16"
style="height:16px;width:auto;max-height:16px;display:block;border:0;">
</a>
</td>
</tr>

</table>

</td>

</tr>

</table>

<hr style="border:none;border-top:1px solid #ddd;margin-top:14px;">

<div style="font-family:Calibri, Arial;font-size:11px;color:#555;line-height:15px;margin-top:10px;">
The contents of this email may be confidential and intended solely for the use of the individual(s) to whom it is addressed. If you are not the intended recipient, please notify the sender immediately and delete this message and any attachments. Any unauthorized review, use, disclosure, or distribution is prohibited.
</div>

`;

}

function copySignature(){

let sig=document.getElementById("signature");

let range=document.createRange();
range.selectNode(sig);

window.getSelection().removeAllRanges();
window.getSelection().addRange(range);

document.execCommand("copy");

window.getSelection().removeAllRanges();

let btn=document.getElementById("copyBtn");
btn.innerText="Copied ✓";
setTimeout(()=>{btn.innerText="Copy Signature";},2000);

}

</script>

</body>
</html>
